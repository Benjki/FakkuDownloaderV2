# Copy to secret.yaml, fill in real values, then:
#   kubectl apply -f k8s/secret.yaml
# Do NOT commit secret.yaml — it is in .gitignore.
apiVersion: v1
kind: Secret
metadata:
  name: fakku-secrets
  namespace: fakkudownloader-v2
type: Opaque
stringData:
  # --- Auth (required) ---
  FAKKU_USERNAME: ""
  FAKKU_PASSWORD: ""
  FAKKU_TOTP_SECRET: ""        # base-32 TOTP secret from your authenticator app

  # --- Collection to sync (required) ---
  FAKKU_COLLECTION_URL: ""     # e.g. https://www.fakku.net/users/yourname/library

  # --- Email notifications (required) ---
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: ""
  SMTP_TO: ""

  # --- Storage paths inside the container (defaults shown) ---
  STORAGE_PRIMARY: "/library"           # manga library — mounted from hostPath
  DONE_FILE: "/queue/done.txt"          # persisted in fakkudownloader-queue PVC
  COOKIES_FILE: "/queue/cookies.pickle"
  TEMP_DIR: "/queue/tmp"

  # --- Tuning (optional, defaults shown) ---
  PAGE_TIMEOUT: "15"
  PAGE_WAIT: "5"
  BOOK_WAIT: "30"
  MIN_IMAGE_SIZE_KB: "50"
  MAX_RETRY: "3"
  ALLOWED_IMAGE_DIMENSIONS: ""         # e.g. "1360x1920,1440x2048" or leave blank
  CHROME_OFFSET: ""                     # leave blank for auto-detect
